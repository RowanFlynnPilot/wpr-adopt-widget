# .github/workflows/update-pets.yml
# 
# Automated pet data scraper for the WP&R Adoptable Pets widget.
# Runs every 6 hours, scrapes all four shelters, and commits 
# updated pet-data.json to the repo (which GitHub Pages serves).
#
# Setup:
#   1. Create a new GitHub repo (e.g., wpr-adopt-widget)
#   2. Copy the /scraper folder and this workflow file into it
#   3. Enable GitHub Pages on the repo (Settings → Pages → main branch)
#   4. The widget HTML loads pet-data.json from the Pages URL

name: Update Pet Data

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm ci

      - name: Run pet scraper
        working-directory: scraper
        run: node build-widget-data.js

      - name: Copy data to docs folder (for GitHub Pages)
        run: |
          mkdir -p docs
          cp scraper/pet-data.json docs/pet-data.json
          echo "Pet data updated at $(date -u)" >> docs/update-log.txt

      - name: Commit and push
        run: |
          git config user.name "WPR Pet Bot"
          git config user.email "bot@wausaupilotandreview.com"
          git add docs/pet-data.json docs/update-log.txt
          git diff --staged --quiet || git commit -m "🐾 Update pet data $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push

name: Update Pet Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check Node version
        run: node --version

      - name: Install dependencies
        run: npm install

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install chrome

      - name: Run pet scraper
        run: node build-widget-data.js

      - name: Commit and push
        run: |
          git config user.name "WPR Pet Bot"
          git config user.email "bot@wausaupilotandreview.com"
          mkdir -p docs
          cp pet-data.json docs/pet-data.json
          date -u > docs/update-log.txt
          git add -A
          git commit -m "🐾 Update pet data" || true
          git push --force origin main

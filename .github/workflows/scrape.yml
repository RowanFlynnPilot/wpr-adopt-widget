name: Scrape Pets

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npx puppeteer browsers install chrome
      - run: node build-widget-data.js
      - name: Push results
        run: |
          git config user.name "WPR Pet Bot"
          git config user.email "bot@wausaupilotandreview.com"
          mkdir -p docs
          cp pet-data.json docs/pet-data.json
          date -u > docs/update-log.txt
          git add -A
          git commit -m "🐾 Update pet data" || true
          git push --force origin main
